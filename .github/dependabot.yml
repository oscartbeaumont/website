version: 2

multi-ecosystem-groups:
  website-deps:
    schedule:
      interval: "weekly"

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    multi-ecosystem-group: "website-deps"
    patterns: ["*"]

  - package-ecosystem: "npm"
    directory: "/"
    multi-ecosystem-group: "website-deps"
    patterns: ["*"]
